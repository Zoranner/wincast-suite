name: CI

on:
  push:
  pull_request:

jobs:
  windows:
    name: Windows workspace
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all -- --check
      - run: cargo test --workspace
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  linux-client:
    name: Linux client x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p wincast-protocol -p wincast-client
      - run: cargo clippy -p wincast-protocol -p wincast-client --all-targets --all-features -- -D warnings

  linux-client-arm64:
    name: Linux client aarch64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - run: cargo check -p wincast-client --target aarch64-unknown-linux-gnu
