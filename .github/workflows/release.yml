name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Tests & Checks
    runs-on: windows-2025-vs2026
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check code formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy checks
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --workspace --all-targets --all-features

  build-release:
    name: Build Release Package (${{ matrix.target }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-2025-vs2026
            package: wincast-host
            binary: wincast-host.exe
            archive: wincast-host-x86_64-pc-windows-msvc.zip
            artifact: wincast-host-x86_64-pc-windows-msvc
            artifact_paths: |
              wincast-host-x86_64-pc-windows-msvc.zip
              wincast-host-x86_64-pc-windows-msvc.zip.sha256
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            package: wincast-client
            binary: wincast-client
            archive: wincast-client-x86_64-unknown-linux-gnu.tar.gz
            artifact: wincast-client-x86_64-unknown-linux-gnu
            artifact_paths: |
              wincast-client-x86_64-unknown-linux-gnu.tar.gz
              wincast-client-x86_64-unknown-linux-gnu.tar.gz.sha256
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            package: wincast-client
            binary: wincast-client
            archive: wincast-client-aarch64-unknown-linux-gnu.tar.gz
            artifact: wincast-client-aarch64-unknown-linux-gnu
            artifact_paths: |
              wincast-client-aarch64-unknown-linux-gnu.tar.gz
              wincast-client-aarch64-unknown-linux-gnu.tar.gz.sha256
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-release-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-release-cargo-

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential pkg-config libsdl2-dev

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --package ${{ matrix.package }}

      - name: Prepare Windows host archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $root = "wincast-host-${{ matrix.target }}"
          $version = "${{ github.ref_name }}"
          $releaseDir = "target/${{ matrix.target }}/release"
          New-Item -ItemType Directory -Force "$root/docs", "$root/examples" | Out-Null
          Copy-Item "$releaseDir/${{ matrix.binary }}" "$root/${{ matrix.binary }}"
          Copy-Item "README.md" "$root/README.md"
          Copy-Item "examples/host.toml" "$root/examples/host.toml"
          Copy-Item -Path @(
            "docs/deployment-prep.md",
            "docs/smoke-test.md",
            "docs/current-status.md",
            "docs/development.md"
          ) -Destination "$root/docs/"
          @(
            "version=$version"
            "commit=${{ github.sha }}"
            "target=${{ matrix.target }}"
            "package=${{ matrix.package }}"
            "binary=${{ matrix.binary }}"
            "built_at=$((Get-Date).ToUniversalTime().ToString('o'))"
          ) | Set-Content "$root/VERSION.txt" -Encoding UTF8
          Compress-Archive -Path "$root" -DestinationPath "${{ matrix.archive }}" -Force
          $hash = (Get-FileHash "${{ matrix.archive }}" -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  ${{ matrix.archive }}" | Set-Content "${{ matrix.archive }}.sha256" -Encoding ASCII

      - name: Prepare Linux client archive
        if: runner.os == 'Linux'
        run: |
          set -euxo pipefail
          root="wincast-client-${{ matrix.target }}"
          release_dir="target/${{ matrix.target }}/release"
          mkdir -p "$root/docs" "$root/examples"
          install -m 0755 "$release_dir/${{ matrix.binary }}" "$root/${{ matrix.binary }}"
          install -m 0644 README.md "$root/README.md"
          install -m 0644 examples/client.toml "$root/examples/client.toml"
          install -m 0644 docs/deployment-prep.md docs/smoke-test.md docs/current-status.md docs/development.md "$root/docs/"
          {
            echo "version=${GITHUB_REF_NAME}"
            echo "commit=${GITHUB_SHA}"
            echo "target=${{ matrix.target }}"
            echo "package=${{ matrix.package }}"
            echo "binary=${{ matrix.binary }}"
            echo "built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > "$root/VERSION.txt"
          tar -czf "${{ matrix.archive }}" "$root"
          sha256sum "${{ matrix.archive }}" > "${{ matrix.archive }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Display artifact structure
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/wincast-host-x86_64-pc-windows-msvc/wincast-host-x86_64-pc-windows-msvc.zip
            artifacts/wincast-host-x86_64-pc-windows-msvc/wincast-host-x86_64-pc-windows-msvc.zip.sha256
            artifacts/wincast-client-x86_64-unknown-linux-gnu/wincast-client-x86_64-unknown-linux-gnu.tar.gz
            artifacts/wincast-client-x86_64-unknown-linux-gnu/wincast-client-x86_64-unknown-linux-gnu.tar.gz.sha256
            artifacts/wincast-client-aarch64-unknown-linux-gnu/wincast-client-aarch64-unknown-linux-gnu.tar.gz
            artifacts/wincast-client-aarch64-unknown-linux-gnu/wincast-client-aarch64-unknown-linux-gnu.tar.gz.sha256
