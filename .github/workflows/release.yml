name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Tests & Checks
    runs-on: windows-2025-vs2026
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check code formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy checks
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --workspace --all-targets --all-features

  build-release:
    name: Build Release Package (${{ matrix.target }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-2025-vs2026
            package: wincast-host
            binary: wincast-host.exe
            archive: wincast-host-x86_64-pc-windows-msvc.zip
            artifact: wincast-host-x86_64-pc-windows-msvc
            artifact_paths: |
              wincast-host-x86_64-pc-windows-msvc.zip
              wincast-host-x86_64-pc-windows-msvc.zip.sha256
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            linux_image: debian/eol:buster
            package: wincast-client
            binary: wincast-client
            archive: wincast-client-x86_64-unknown-linux-gnu.tar.gz
            artifact: wincast-client-x86_64-unknown-linux-gnu
            artifact_paths: |
              wincast-client-x86_64-unknown-linux-gnu.tar.gz
              wincast-client-x86_64-unknown-linux-gnu.tar.gz.sha256
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            linux_image: debian/eol:buster
            package: wincast-client
            binary: wincast-client
            archive: wincast-client-aarch64-unknown-linux-gnu.tar.gz
            artifact: wincast-client-aarch64-unknown-linux-gnu
            artifact_paths: |
              wincast-client-aarch64-unknown-linux-gnu.tar.gz
              wincast-client-aarch64-unknown-linux-gnu.tar.gz.sha256
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        if: runner.os == 'Windows'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo dependencies
        if: runner.os == 'Windows'
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-release-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-release-cargo-

      - name: Build release binary
        if: runner.os == 'Windows'
        run: cargo build --release --target ${{ matrix.target }} --package ${{ matrix.package }}

      - name: Build and package Linux client archive
        if: runner.os == 'Linux'
        run: |
          docker run --rm \
            -e CARGO_TERM_COLOR=always \
            -e GITHUB_REF_NAME="${GITHUB_REF_NAME}" \
            -e GITHUB_SHA="${GITHUB_SHA}" \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            "${{ matrix.linux_image }}" \
            bash -lc '
              set -euxo pipefail
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y --no-install-recommends \
                ca-certificates \
                curl \
                build-essential \
                binutils \
                cmake \
                nasm \
                pkg-config \
                libasound2-dev \
                libdbus-1-dev \
                libgl1-mesa-dev \
                libibus-1.0-dev \
                libpulse-dev \
                libudev-dev \
                libwayland-dev \
                libx11-dev \
                libxcursor-dev \
                libxext-dev \
                libxi-dev \
                libxinerama-dev \
                libxkbcommon-dev \
                libxrandr-dev \
                libxrender-dev \
                libxss-dev \
                libxtst-dev
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs \
                | sh -s -- -y --profile minimal --default-toolchain stable --target "${{ matrix.target }}"
              . "$HOME/.cargo/env"

              cargo build --release --target "${{ matrix.target }}" --package "${{ matrix.package }}"
              binary_path="target/${{ matrix.target }}/release/${{ matrix.binary }}"
              readelf --version-info "$binary_path" \
                | grep -o "GLIBC_[0-9.]*" \
                | sort -Vu \
                | tail -n 8 || true
              if readelf --version-info "$binary_path" \
                | grep -E "GLIBC_2\\.([3-9][0-9]|29)" >/dev/null; then
                echo "release binary requires glibc newer than 2.28"
                exit 1
              fi

              root="wincast-client-${{ matrix.target }}"
              rm -rf "$root"
              mkdir -p "$root/examples"
              install -m 0755 "$binary_path" "$root/${{ matrix.binary }}"
              install -m 0644 README.md "$root/README.md"
              install -m 0644 examples/client.toml "$root/examples/client.toml"
              {
                echo "version=${GITHUB_REF_NAME}"
                echo "commit=${GITHUB_SHA}"
                echo "target=${{ matrix.target }}"
                echo "package=${{ matrix.package }}"
                echo "binary=${{ matrix.binary }}"
                echo "linux_image=${{ matrix.linux_image }}"
                echo "built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              } > "$root/VERSION.txt"
              tar -czf "${{ matrix.archive }}" "$root"
              sha256sum "${{ matrix.archive }}" > "${{ matrix.archive }}.sha256"
            '

      - name: Prepare Windows host archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $root = "wincast-host-${{ matrix.target }}"
          $version = "${{ github.ref_name }}"
          $releaseDir = "target/${{ matrix.target }}/release"
          New-Item -ItemType Directory -Force "$root/examples" | Out-Null
          Copy-Item "$releaseDir/${{ matrix.binary }}" "$root/${{ matrix.binary }}"
          Copy-Item "README.md" "$root/README.md"
          Copy-Item "examples/host.toml" "$root/examples/host.toml"
          @(
            "version=$version"
            "commit=${{ github.sha }}"
            "target=${{ matrix.target }}"
            "package=${{ matrix.package }}"
            "binary=${{ matrix.binary }}"
            "built_at=$((Get-Date).ToUniversalTime().ToString('o'))"
          ) | Set-Content "$root/VERSION.txt" -Encoding UTF8
          Compress-Archive -Path "$root" -DestinationPath "${{ matrix.archive }}" -Force
          $hash = (Get-FileHash "${{ matrix.archive }}" -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  ${{ matrix.archive }}" | Set-Content "${{ matrix.archive }}.sha256" -Encoding ASCII

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Display artifact structure
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/wincast-host-x86_64-pc-windows-msvc/wincast-host-x86_64-pc-windows-msvc.zip
            artifacts/wincast-host-x86_64-pc-windows-msvc/wincast-host-x86_64-pc-windows-msvc.zip.sha256
            artifacts/wincast-client-x86_64-unknown-linux-gnu/wincast-client-x86_64-unknown-linux-gnu.tar.gz
            artifacts/wincast-client-x86_64-unknown-linux-gnu/wincast-client-x86_64-unknown-linux-gnu.tar.gz.sha256
            artifacts/wincast-client-aarch64-unknown-linux-gnu/wincast-client-aarch64-unknown-linux-gnu.tar.gz
            artifacts/wincast-client-aarch64-unknown-linux-gnu/wincast-client-aarch64-unknown-linux-gnu.tar.gz.sha256
